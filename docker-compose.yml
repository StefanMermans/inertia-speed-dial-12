volumes:
    speed-dial-db:
    speed-dial-storage:

networks:
  app:
    driver: bridge

services:
    app:
        restart: unless-stopped
        build:
            context: .
            dockerfile: Dockerfile
        shm_size: 128mb
        ports:
            - "8024:80"
        volumes:
            - speed-dial-storage:/var/www/storage
        depends_on:
            db:
                condition: service_healthy
        networks:
            - app
    db:
        image: postgres:17.3
        restart: unless-stopped
        volumes:
            - speed-dial-db:/var/lib/postgresql/data
        environment:
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_DATABASE}
        networks:
            - app
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
            interval: 10s
            timeout: 5s
            retries: 5

