name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            # Ensure deployment dir exists
            DEPLOY_DIR=./inertia-speed-dial-12/
            rm -rf $DEPLOY_DIR
            mkdir -p $DEPLOY_DIR

            cd $DEPLOY_DIR

            # Clone latest repo
            git clone --depth 1 -b main git@github.com:${{ github.repository }} .
            
            # Inject .env
            cp .env.prod .env
            echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
            echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
            echo "ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}" >> .env
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env

            # Build + run docker
            sudo docker compose down
            sudo docker compose up --build -d

            # Clean up repo (code lives inside docker image)
            cd ..//
            rm -rf $DEPLOY_DIR
